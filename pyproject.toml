[project]
name = "velmora-incident-env"
version = "0.1.0"
description = "OpenEnv environment for incident response simulation"
authors = [
    {name = "Khushi Ramchandani"}
]
dependencies = [
    "fastapi",
    "uvicorn",
    "pydantic",
    "openai",
    "numpy"
]

[project.scripts]
server = "server.app:main"

[tool.setuptools]
packages = ["velmora_env", "baseline", "server"]

[build-system]
requires = ["setuptools", "wheel"]
build-backend = "setuptools.build_meta"